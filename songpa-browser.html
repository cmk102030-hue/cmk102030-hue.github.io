<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>송파구 월세 매물 브라우저</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:#0f1117;color:#e4e4e7;height:100vh;overflow:hidden}
.app{display:grid;grid-template-rows:56px 1fr 260px;height:100vh}
.header{background:#16171e;border-bottom:1px solid #2a2b35;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.header h1{font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.header h1 span{font-size:20px}
.header-right{display:flex;align-items:center;gap:12px}
.badge{background:#2563eb;color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:100px}
.btn{background:#2563eb;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;font-family:inherit}
.btn:hover{background:#1d4ed8}
.btn-s{background:#2a2b35;color:#c4c4cc}.btn-s:hover{background:#3b3c4a}
.map-area{display:grid;grid-template-columns:260px 1fr;overflow:hidden}
.fp{background:#16171e;border-right:1px solid #2a2b35;padding:14px;overflow-y:auto}
.fs{margin-bottom:14px}
.fl{font-size:11px;font-weight:600;color:#8b8c99;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.cg{display:flex;flex-direction:column;gap:4px}
.ci{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:#c4c4cc}
.ci input[type=checkbox]{accent-color:#2563eb;width:15px;height:15px}
.td{width:8px;height:8px;border-radius:50%;display:inline-block}
.d1{background:#3b82f6}.d2{background:#f59e0b}.d3{background:#22c55e}.d4{background:#ef4444}.d5{background:#a855f7}.d6{background:#06b6d4}
.rr{display:flex;align-items:center;gap:6px;margin-top:4px}
.ri{width:100%;background:#1e1f2a;border:1px solid #2a2b35;color:#e4e4e7;padding:5px 8px;border-radius:6px;font-size:12px;font-family:inherit}
.ri::placeholder{color:#4a4b5a}.ri:focus{outline:none;border-color:#2563eb}
.tr{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.tr label{font-size:13px;color:#c4c4cc}
.ts{position:relative;width:38px;height:20px}
.ts input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:#2a2b35;border-radius:10px;cursor:pointer;transition:background .2s}
.tsl::before{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s}
.ts input:checked+.tsl{background:#2563eb}
.ts input:checked+.tsl::before{transform:translateX(18px)}
.fd{border:none;border-top:1px solid #2a2b35;margin:10px 0}
#map{width:100%;height:100%}
.ta{background:#16171e;border-top:1px solid #2a2b35;display:flex;flex-direction:column}
.th{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid #2a2b35}
.th h3{font-size:13px;font-weight:600;color:#8b8c99}
.ss{background:#1e1f2a;border:1px solid #2a2b35;color:#c4c4cc;padding:4px 8px;border-radius:6px;font-size:12px;font-family:inherit}
.tsc{overflow-y:auto;flex:1}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{position:sticky;top:0;background:#1a1b24;color:#8b8c99;font-weight:600;text-align:left;padding:7px 12px;border-bottom:1px solid #2a2b35;white-space:nowrap}
tbody tr{cursor:pointer;transition:background .15s}
tbody tr:hover{background:#1e1f2a}
tbody td{padding:7px 12px;border-bottom:1px solid #1e1f2a;white-space:nowrap;color:#c4c4cc}
.tb{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.b1{background:rgba(59,130,246,.15);color:#60a5fa}.b2{background:rgba(245,158,11,.15);color:#fbbf24}
.b3{background:rgba(34,197,94,.15);color:#4ade80}.b4{background:rgba(239,68,68,.15);color:#f87171}
.b5{background:rgba(168,85,247,.15);color:#c084fc}.b6{background:rgba(6,182,212,.15);color:#22d3ee}
.ln{color:#60a5fa;text-decoration:none;font-size:11px}.ln:hover{text-decoration:underline}
.em{text-align:center;padding:40px;color:#4a4b5a;font-size:13px}
.mb{display:none;position:fixed;inset:0;background:rgba(15,17,23,.92);z-index:10000;justify-content:center;align-items:center}
.mb.active{display:flex}
.md{background:#16171e;border:1px solid #2a2b35;border-radius:12px;padding:24px;width:540px;max-height:80vh}
.md h3{color:#fff;margin-bottom:6px;font-size:16px}
.md p{color:#8b8c99;font-size:13px;margin-bottom:12px;line-height:1.5}
.md textarea{width:100%;height:200px;background:#1e1f2a;border:1px solid #2a2b35;color:#e4e4e7;border-radius:8px;padding:12px;font-size:12px;font-family:monospace;resize:vertical}
.mbb{display:flex;gap:8px;margin-top:12px}.mbb .btn{flex:1;padding:10px;font-size:14px}
.leaflet-container{background:#1a1b2e}
.leaflet-popup-content-wrapper{background:#1e1f2a;color:#e4e4e7;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.leaflet-popup-tip{background:#1e1f2a}
.leaflet-popup-content{margin:10px 14px;font-family:'Pretendard',sans-serif;font-size:13px}
.leaflet-popup-close-button{color:#8b8c99!important}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1><span>🏠</span> 송파구 월세 매물 브라우저</h1>
    <div class="header-right">
      <span class="badge" id="countBadge">0개 단지</span>
      <button class="btn" onclick="fetchData()">매물 수집</button>
      <button class="btn btn-s" onclick="showModal()">JSON 붙여넣기</button>
    </div>
  </div>
  <div class="map-area">
    <div class="fp">
      <div class="fs"><div class="fl">매물 유형</div>
        <div class="cg">
          <label class="ci"><input type="checkbox" checked data-type="APT" onchange="af()"><span class="td d1"></span> 아파트</label>
          <label class="ci"><input type="checkbox" checked data-type="OPST" onchange="af()"><span class="td d2"></span> 오피스텔</label>
          <label class="ci"><input type="checkbox" checked data-type="VL" onchange="af()"><span class="td d3"></span> 빌라</label>
          <label class="ci"><input type="checkbox" checked data-type="JGC" onchange="af()"><span class="td d4"></span> 재건축</label>
          <label class="ci"><input type="checkbox" checked data-type="PRE" onchange="af()"><span class="td d5"></span> 분양권</label>
          <label class="ci"><input type="checkbox" checked data-type="ABYG" onchange="af()"><span class="td d6"></span> 주상복합</label>
        </div>
      </div>
      <hr class="fd">
      <div class="fs"><div class="fl">전용면적 (㎡)</div>
        <div class="rr"><input type="number" class="ri" id="areaMin" placeholder="최소" onchange="af()"><span style="color:#4a4b5a">~</span><input type="number" class="ri" id="areaMax" placeholder="최대" onchange="af()"></div>
      </div>
      <hr class="fd">
      <div class="fs"><div class="fl">세대수</div>
        <div class="rr"><input type="number" class="ri" id="hhMin" placeholder="최소" onchange="af()"><span style="color:#4a4b5a">~</span><input type="number" class="ri" id="hhMax" placeholder="최대" onchange="af()"></div>
      </div>
      <hr class="fd">
      <div class="fs"><div class="fl">주변 시설</div>
        <div class="tr"><label>🚇 지하철역</label><div class="ts"><input type="checkbox" id="tSub" checked onchange="tl('s')"><span class="tsl"></span></div></div>
        <div class="tr"><label>🌳 공원</label><div class="ts"><input type="checkbox" id="tPark" checked onchange="tl('p')"><span class="tsl"></span></div></div>
      </div>
    </div>
    <div id="map"></div>
  </div>
  <div class="ta">
    <div class="th"><h3 id="tt">매물 수집 버튼을 눌러주세요</h3>
      <select class="ss" id="sort" onchange="af()"><option value="name">이름순</option><option value="area">면적순</option><option value="hh">세대수순</option><option value="art">매물수순</option></select>
    </div>
    <div class="tsc"><table><thead><tr><th>유형</th><th>단지명</th><th>면적</th><th>세대</th><th>동</th><th>준공</th><th>매물</th><th>링크</th></tr></thead>
      <tbody id="tb"><tr><td colspan="8" class="em">매물 수집 버튼을 눌러 데이터를 불러오세요</td></tr></tbody></table></div>
  </div>
</div>
<div class="mb" id="modal">
  <div class="md">
    <h3>JSON 데이터 붙여넣기</h3>
    <p>네이버 부동산 송파구 → <code>Cmd+Option+I</code> → Network → Fetch/XHR →<br><code>2.0?cortarNo=...</code> → <strong>Response</strong> 탭 전체 복사</p>
    <textarea id="ji" placeholder="여기에 JSON을 붙여넣으세요..."></textarea>
    <div class="mbb"><button class="btn" onclick="loadJSON()">불러오기</button><button class="btn btn-s" onclick="hideModal()">닫기</button></div>
  </div>
</div>
<script>
let D=[],F=[];
const TC={APT:'#3b82f6',OPST:'#f59e0b',VL:'#22c55e',JGC:'#ef4444',PRE:'#a855f7',ABYG:'#06b6d4'};
const TN={APT:'아파트',OPST:'오피스텔',VL:'빌라',JGC:'재건축',PRE:'분양권',ABYG:'주상복합'};
const TB={APT:'b1',OPST:'b2',VL:'b3',JGC:'b4',PRE:'b5',ABYG:'b6'};
const SUB=[{n:'잠실',l:'2/8',a:37.5133,o:127.1001},{n:'잠실새내',l:'2',a:37.5114,o:127.0862},{n:'종합운동장',l:'2/9',a:37.5109,o:127.0736},{n:'삼전',l:'9',a:37.5044,o:127.0855},{n:'석촌고분',l:'9',a:37.5048,o:127.0966},{n:'석촌',l:'8/9',a:37.5057,o:127.1053},{n:'송파',l:'8',a:37.5004,o:127.1093},{n:'가락시장',l:'3/8',a:37.4924,o:127.1184},{n:'문정',l:'8',a:37.4857,o:127.1228},{n:'장지',l:'8',a:37.4783,o:127.1261},{n:'복정',l:'8/수인분당',a:37.4709,o:127.1267},{n:'올림픽공원',l:'5/9',a:37.5163,o:127.1310},{n:'방이',l:'5',a:37.5087,o:127.1268},{n:'오금',l:'3/5',a:37.5032,o:127.1278},{n:'개롱',l:'5',a:37.4935,o:127.1332},{n:'거여',l:'5',a:37.4921,o:127.1431},{n:'마천',l:'5',a:37.4947,o:127.1524},{n:'둔촌동',l:'5',a:37.5201,o:127.1357}];
const PK=[{n:'올림픽공원',a:37.5204,o:127.1215},{n:'석촌호수공원',a:37.5075,o:127.1018},{n:'송파나루공원',a:37.5174,o:127.1078},{n:'성내천',a:37.5146,o:127.1397},{n:'탄천',a:37.4945,o:127.1089},{n:'오금공원',a:37.5021,o:127.1338}];

const map=L.map('map',{center:[37.5048,127.1120],zoom:14,zoomControl:false});
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19}).addTo(map);

const mL=L.layerGroup().addTo(map),sL=L.layerGroup().addTo(map),pL=L.layerGroup().addTo(map);

function ico(t,c){return L.divIcon({className:'',html:`<div style="background:${c};color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap;font-family:Pretendard,sans-serif;box-shadow:0 2px 6px rgba(0,0,0,.4);border:1.5px solid rgba(255,255,255,.3)">${t}</div>`,iconAnchor:[0,0]})}

function fd(y){return y?y.substring(0,4)+'.'+y.substring(4,6):'-'}

function rSub(){sL.clearLayers();SUB.forEach(s=>L.marker([s.a,s.o],{icon:ico('🚇 '+s.n+' ('+s.l+')','#7c3aed'),interactive:false}).addTo(sL))}
function rPark(){pL.clearLayers();PK.forEach(p=>L.marker([p.a,p.o],{icon:ico('🌳 '+p.n,'#15803d'),interactive:false}).addTo(pL))}
rSub();rPark();

async function fetchData(){
  try{
    const r=await fetch('https://new.land.naver.com/api/complexes/single-markers/2.0?cortarNo=1171010400&zoom=15&priceType=RETAIL&markerId&markerType&selectedComplexNo&selectedComplexBuildingNo&fakeComplexMarker&realEstateType=APT%3APRE%3AABYG%3AJGC%3AOPST%3AVL&tradeType=B1&tag=%3A%3A%3A%3A%3A%3A%3A%3A&rentPriceMin=0&rentPriceMax=900000000&priceMin=0&priceMax=900000000&areaMin=0&areaMax=900000000&oldBuildYears&recentlyBuildYears&minHouseHoldCount&maxHouseHoldCount&showArticle=false&sameAddressGroup=false&minMaintenanceCost&maxMaintenanceCost&directions=&leftLon=127.0580&rightLon=127.1520&topLat=37.5270&bottomLat=37.4780&isPresale=true',{headers:{'Accept':'application/json','Referer':'https://new.land.naver.com/'}});
    if(!r.ok)throw 0;D=await r.json()||[];af();document.getElementById('tt').textContent='총 '+D.length+'개 단지';
  }catch(e){showModal()}
}

function showModal(){document.getElementById('modal').classList.add('active')}
function hideModal(){document.getElementById('modal').classList.remove('active')}
function loadJSON(){try{const d=JSON.parse(document.getElementById('ji').value.trim());D=Array.isArray(d)?d:[d];af();document.getElementById('tt').textContent='총 '+D.length+'개 단지';hideModal()}catch(e){alert('JSON 형식을 확인해주세요.')}}

function af(){
  const ts=new Set();document.querySelectorAll('[data-type]').forEach(c=>{if(c.checked)ts.add(c.dataset.type)});
  const a0=parseFloat(document.getElementById('areaMin').value)||0,a1=parseFloat(document.getElementById('areaMax').value)||Infinity;
  const h0=parseInt(document.getElementById('hhMin').value)||0,h1=parseInt(document.getElementById('hhMax').value)||Infinity;
  F=D.filter(d=>{if(!ts.has(d.realEstateTypeCode))return false;const a=parseFloat(d.minArea||d.representativeArea||0);if(a<a0||a>a1)return false;const h=d.totalHouseholdCount||0;return h>=h0&&h<=h1});
  const s=document.getElementById('sort').value;
  F.sort((a,b)=>s==='name'?(a.complexName||'').localeCompare(b.complexName||''):s==='area'?(parseFloat(b.minArea)||0)-(parseFloat(a.minArea)||0):s==='hh'?(b.totalHouseholdCount||0)-(a.totalHouseholdCount||0):(b.totalArticleCount||0)-(a.totalArticleCount||0));
  document.getElementById('countBadge').textContent=F.length+'개 단지';
  rM();rT();
}

function rM(){
  mL.clearLayers();
  F.forEach(d=>{
    const c=TC[d.realEstateTypeCode]||'#888',tn=TN[d.realEstateTypeCode]||'',ar=d.minArea&&d.maxArea&&d.minArea!==d.maxArea?d.minArea+'~'+d.maxArea:(d.minArea||d.representativeArea||'-');
    const m=L.marker([d.latitude,d.longitude],{icon:ico(d.complexName||d.markerId,c)}).addTo(mL);
    m.bindPopup(`<div style="min-width:180px"><strong style="font-size:14px;color:#fff">${d.complexName||'-'}</strong><div style="margin-top:6px;color:#a1a1aa;line-height:1.6">${tn} · ${d.totalHouseholdCount||'-'}세대 · ${d.totalDongCount||'-'}동<br>면적: ${ar}㎡<br>준공: ${fd(d.completionYearMonth)}<br>매물: ${d.totalArticleCount||0}건<br><a href="https://new.land.naver.com/complexes/${d.markerId}" target="_blank" style="color:#60a5fa">네이버 부동산에서 보기 →</a></div></div>`);
  });
}

function rT(){
  const t=document.getElementById('tb');
  if(!F.length){t.innerHTML='<tr><td colspan="8" class="em">조건에 맞는 단지가 없습니다</td></tr>';return}
  t.innerHTML=F.map(d=>{const tc=d.realEstateTypeCode||'',ar=d.minArea&&d.maxArea&&d.minArea!==d.maxArea?d.minArea+'~'+d.maxArea:(d.minArea||d.representativeArea||'-');
    return `<tr onclick="map.flyTo([${d.latitude},${d.longitude}],16)"><td><span class="tb ${TB[tc]||''}">${TN[tc]||'-'}</span></td><td style="color:#fff;font-weight:500">${d.complexName||'-'}</td><td>${ar}㎡</td><td>${d.totalHouseholdCount||'-'}</td><td>${d.totalDongCount||'-'}</td><td>${fd(d.completionYearMonth)}</td><td>${d.totalArticleCount||0}건</td><td><a class="ln" href="https://new.land.naver.com/complexes/${d.markerId}" target="_blank">상세</a></td></tr>`}).join('');
}

function tl(t){t==='s'?(document.getElementById('tSub').checked?sL.addTo(map):map.removeLayer(sL)):(document.getElementById('tPark').checked?pL.addTo(map):map.removeLayer(pL))}
</script>
</body>
</html>
